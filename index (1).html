<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Centre Diagnostic — Common Space Project</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --soil:#3A2410;
  --now:#C17B2A;
  --future:#4A6A2E;
  --parch:#FDF8F2;
  --border:#DCC8A8;
  --muted:#7A5C44;
  --text:#2C1A0E;
  --track:#DCC8A8;
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--parch);color:var(--text);
  min-height:100vh;padding:1.5rem 1.25rem 3rem;
}
.wrap{max-width:680px;margin:0 auto}

h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(1.3rem,3.5vw,1.9rem);font-weight:700;
  color:var(--soil);margin-bottom:.25rem;line-height:1.25
}
.sub{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}

/* Spider */
.spider-wrap{text-align:center;margin-bottom:1.75rem}
#spider{width:100%;max-width:640px;height:auto;display:block;margin:0 auto}
.legend{display:flex;justify-content:center;gap:2rem;margin-top:.6rem;font-size:.76rem;color:var(--muted)}
.ldot{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px}

/* Slider list — replaces table for mobile friendliness */
.slider-list{display:flex;flex-direction:column;gap:0}

.col-heads{
  display:grid;
  grid-template-columns:1fr minmax(120px,1.6fr) 64px;
  gap:0 .5rem;
  padding:.25rem .5rem .4rem;
  border-bottom:1px solid var(--border);
  margin-bottom:.2rem;
}
.col-heads span{
  font-size:.6rem;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
}
.col-heads .ch-mid{text-align:center}
.col-heads .ch-right{text-align:right;white-space:nowrap}

.srow{
  display:grid;
  grid-template-columns:1fr minmax(120px,1.6fr) 64px;
  gap:0 .5rem;
  align-items:center;
  padding:.55rem .5rem;
  border-bottom:1px solid rgba(220,200,168,.35);
}

.centre-info{min-width:0}
.centre-name{
  font-size:.8rem;font-weight:500;color:var(--text);
  display:block;margin-bottom:.1rem;line-height:1.2
}
.centre-def{
  font-size:.65rem;color:var(--muted);line-height:1.35;
  font-weight:300;display:block
}

/* dual-range */
.dual-range{position:relative;height:28px}
.dual-range input[type=range]{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;margin:0;padding:0;
  -webkit-appearance:none;appearance:none;
  background:transparent;pointer-events:none;
  height:4px;outline:none;
}
.dual-range input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;pointer-events:all;
  width:20px;height:20px;border-radius:50%;
  border:2.5px solid var(--parch);cursor:grab;
  transition:transform .1s;
}
.dual-range input[type=range]:active::-webkit-slider-thumb{cursor:grabbing;transform:scale(1.15)}
.dual-range input[type=range]::-moz-range-thumb{
  pointer-events:all;width:17px;height:17px;
  border-radius:50%;border:2px solid var(--parch);cursor:grab;
}
.r-now::-webkit-slider-thumb{background:var(--now) !important}
.r-now::-moz-range-thumb{background:var(--now)}
.r-future::-webkit-slider-thumb{background:var(--future) !important}
.r-future::-moz-range-thumb{background:var(--future)}
.track-bg{
  position:absolute;top:50%;left:0;right:0;height:4px;
  background:var(--track);border-radius:2px;transform:translateY(-50%);
  pointer-events:none;z-index:0
}
.track-fill{
  position:absolute;top:50%;height:4px;
  background:linear-gradient(to right,rgba(193,123,42,.45),rgba(74,106,46,.45));
  border-radius:2px;transform:translateY(-50%);
  pointer-events:none;z-index:1
}

.val-pair{
  display:flex;align-items:center;justify-content:flex-end;
  gap:.3rem;white-space:nowrap
}
.vnow{font-size:.73rem;font-weight:600;color:var(--now)}
.vfuture{font-size:.73rem;font-weight:600;color:var(--future)}
.val-arrow{font-size:.6rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <h1>What field of learning is most important to you, and how does this change?</h1>
  <p class="sub">Drag the <span style="color:var(--now);font-weight:500">amber</span> dot for relevance today. Drag the <span style="color:var(--future);font-weight:500">green</span> dot for how relevant it will be in 5 years.</p>

  <div class="spider-wrap">
    <canvas id="spider" width="640" height="620"></canvas>
    <div class="legend">
      <span><span class="ldot" style="background:var(--now)"></span>How relevant is it now?</span>
      <span><span class="ldot" style="background:var(--future)"></span>How relevant in 5 years?</span>
    </div>
  </div>

  <div class="slider-list">

    <div class="col-heads">
      <span>Practice Centre</span>
      <span class="ch-mid">Low – High</span>
      <span class="ch-right">Now / 5yr</span>
    </div>

    <div id="slider-rows"></div>

  </div>
</div>

<script>
var CENTRES = [
  {key:'study',        label:'Study',        spider:'Study',        def:'Think critically, read deeply, and write effectively.'},
  {key:'growth',       label:'Growth',       spider:'Growth',       def:'Build self-awareness, self-belief, and goal-clarity.'},
  {key:'research',     label:'Research',     spider:'Research',     def:'Source new information, validate knowledge, and stay at the leading edge.'},
  {key:'innovation',   label:'Innovation',   spider:'Innovation',   def:'Transform experience into improvement, new solutions, and change.'},
  {key:'leadership',   label:'Leadership',   spider:'Leadership',   def:'Build and motivate sustainable, high-performing teams and organisations.'},
  {key:'professional', label:'Professional', spider:'Prof.',        def:'Demonstrate personal effectiveness, integrity, and competence across management and professional roles.'},
  {key:'digital',      label:'Digital',      spider:'Digital',      def:'Utilise technology seamlessly to maximise personal and organisational effectiveness.'}
];
var N = CENTRES.length;
var NOW  = {study:5,growth:5,research:4,innovation:6,leadership:5,professional:5,digital:4};
var FIVE = {study:8,growth:8,research:6,innovation:8,leadership:9,professional:7,digital:7};

/* Build slider rows */
var container = document.getElementById('slider-rows');
CENTRES.forEach(function(c){
  var row = document.createElement('div');
  row.className = 'srow';
  row.innerHTML =
    '<div class="centre-info">'+
      '<span class="centre-name">'+c.label+'</span>'+
      '<span class="centre-def">'+c.def+'</span>'+
    '</div>'+
    '<div class="dual-range" id="dr-'+c.key+'">'+
      '<div class="track-bg"></div>'+
      '<div class="track-fill" id="tf-'+c.key+'"></div>'+
      '<input type="range" class="r-now"    id="n-'+c.key+'" min="0" max="10" step="1" value="'+NOW[c.key]+'">'+
      '<input type="range" class="r-future" id="f-'+c.key+'" min="0" max="10" step="1" value="'+FIVE[c.key]+'">'+
    '</div>'+
    '<div class="val-pair">'+
      '<span class="vnow"    id="nv-'+c.key+'">'+NOW[c.key]+'</span>'+
      '<span class="val-arrow">→</span>'+
      '<span class="vfuture" id="fv-'+c.key+'">'+FIVE[c.key]+'</span>'+
    '</div>';
  container.appendChild(row);
});

function updateTrack(c){
  var lo=Math.min(NOW[c.key],FIVE[c.key])/10;
  var hi=Math.max(NOW[c.key],FIVE[c.key])/10;
  var tf=document.getElementById('tf-'+c.key);
  tf.style.left=(lo*100)+'%';
  tf.style.width=((hi-lo)*100)+'%';
}
CENTRES.forEach(function(c){
  updateTrack(c);
  document.getElementById('n-'+c.key).addEventListener('input',function(){
    NOW[c.key]=+this.value;
    document.getElementById('nv-'+c.key).textContent=this.value;
    updateTrack(c);kick();
  });
  document.getElementById('f-'+c.key).addEventListener('input',function(){
    FIVE[c.key]=+this.value;
    document.getElementById('fv-'+c.key).textContent=this.value;
    updateTrack(c);kick();
  });
});

/* ── Spider ── */
var cvs=document.getElementById('spider');
var ctx=cvs.getContext('2d');
var W=640,H=620,MX=320,MY=310,R=208;

var cNow={},cFive={};
CENTRES.forEach(function(c){
  cNow[c.key]=NOW[c.key]/10;
  cFive[c.key]=FIVE[c.key]/10;
});

var rafId=null;
function lerp(a,b,t){return a+(b-a)*t}
function kick(){if(!rafId) rafId=requestAnimationFrame(animate)}
function animate(){
  var dirty=false;
  CENTRES.forEach(function(c){
    var tn=NOW[c.key]/10,tf=FIVE[c.key]/10;
    if(Math.abs(cNow[c.key]-tn)>.0008||Math.abs(cFive[c.key]-tf)>.0008) dirty=true;
    cNow[c.key]=lerp(cNow[c.key],tn,.13);
    cFive[c.key]=lerp(cFive[c.key],tf,.13);
  });
  draw();
  rafId=dirty?requestAnimationFrame(animate):null;
}

function angle(i){return -Math.PI/2+i*(2*Math.PI/N)}
function pt(i,val){var a=angle(i);return{x:MX+val*R*Math.cos(a),y:MY+val*R*Math.sin(a)}}

function drawPoly(store,fill,stroke,lw){
  ctx.beginPath();
  CENTRES.forEach(function(c,i){var p=pt(i,store[c.key]);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.closePath();
  ctx.fillStyle=fill;ctx.fill();
  ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  /* rings */
  [.25,.5,.75,1].forEach(function(f){
    ctx.beginPath();
    CENTRES.forEach(function(c,i){var p=pt(i,f);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
    ctx.closePath();
    ctx.strokeStyle=f===1?'rgba(130,100,60,.35)':'rgba(130,100,60,.13)';
    ctx.lineWidth=f===1?1:.5;
    ctx.setLineDash(f<1?[3,4]:[]);ctx.stroke();ctx.setLineDash([]);
  });

  /* spokes */
  CENTRES.forEach(function(c,i){
    var tip=pt(i,1);
    ctx.beginPath();ctx.moveTo(MX,MY);ctx.lineTo(tip.x,tip.y);
    ctx.strokeStyle='rgba(140,105,65,.2)';ctx.lineWidth=.7;ctx.stroke();
  });

  /* polygons */
  drawPoly(cFive,'rgba(74,106,46,.12)','#4A6A2E',1.8);
  drawPoly(cNow,'rgba(193,123,42,.18)','#C17B2A',2);

  /* dots */
  CENTRES.forEach(function(c,i){
    var pf=pt(i,cFive[c.key]);
    ctx.beginPath();ctx.arc(pf.x,pf.y,7,0,Math.PI*2);
    ctx.strokeStyle='rgba(74,106,46,.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(pf.x,pf.y,5,0,Math.PI*2);
    ctx.fillStyle='#4A6A2E';ctx.fill();

    var pn=pt(i,cNow[c.key]);
    ctx.beginPath();ctx.arc(pn.x,pn.y,7,0,Math.PI*2);
    ctx.strokeStyle='rgba(193,123,42,.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(pn.x,pn.y,5,0,Math.PI*2);
    ctx.fillStyle='#C17B2A';ctx.fill();
  });

  /* labels — per-spoke positioning with extra room */
  CENTRES.forEach(function(c,i){
    var a = angle(i);
    var LR = R + 46;
    var lx = MX + LR*Math.cos(a);
    var ly = MY + LR*Math.sin(a);

    ctx.font = '500 13.5px \'DM Sans\',system-ui,sans-serif';
    ctx.fillStyle = '#3A2410';

    var THR = 18;
    ctx.textAlign    = lx < MX-THR ? 'right' : lx > MX+THR ? 'left' : 'center';
    ctx.textBaseline = ly < MY-THR ? 'bottom' : ly > MY+THR ? 'top' : 'middle';

    /* split spider label at space if it exists */
    var words = c.spider.split(' ');
    if(words.length === 1){
      ctx.fillText(c.spider, lx, ly);
    } else {
      var lineH = 16;
      ctx.fillText(words[0], lx, ly - lineH/2);
      ctx.fillText(words.slice(1).join(' '), lx, ly + lineH/2);
    }
  });
}

draw();kick();
</script>
</body>
</html>
