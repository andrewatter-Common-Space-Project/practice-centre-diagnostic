<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Centre Diagnostic — Common Space Project</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --soil:#3A2410;
  --now:#C17B2A;
  --future:#4A6A2E;
  --parch:#FDF8F2;
  --border:#DCC8A8;
  --muted:#7A5C44;
  --text:#2C1A0E;
  --track:#DCC8A8;
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--parch);color:var(--text);
  min-height:100vh;padding:2.5rem 2rem 4rem;
}
.wrap{max-width:720px;margin:0 auto}
h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(1.4rem,3.5vw,1.9rem);font-weight:700;
  color:var(--soil);margin-bottom:.3rem;line-height:1.25
}
.sub{font-size:.8rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.6}
.spider-wrap{text-align:center;margin-bottom:2rem}
#spider{width:100%;max-width:620px;height:auto;display:block;margin:0 auto}
.legend{display:flex;justify-content:center;gap:2rem;margin-top:.8rem;font-size:.76rem;color:var(--muted)}
.ldot{width:11px;height:11px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:5px}

/* Table */
.slider-table{width:100%;border-collapse:collapse;table-layout:fixed}
.slider-table th{
  font-size:.62rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);padding:.3rem .5rem .5rem;border-bottom:1px solid var(--border)
}
.col-name{width:175px}
.col-slider{text-align:center}
.col-vals{width:88px;text-align:right}

.slider-table td{padding:.55rem .5rem;vertical-align:top}
.slider-table tr:not(:last-child) td{border-bottom:1px solid rgba(220,200,168,.4)}

.centre-name{font-size:.8rem;font-weight:500;color:var(--text);line-height:1.3;display:block;margin-bottom:.15rem}
.centre-def{font-size:.68rem;color:var(--muted);line-height:1.4;font-weight:300}

/* dual-range sits vertically centred in its cell */
.slider-td{vertical-align:middle !important}
.dual-range{position:relative;height:30px}
.dual-range input[type=range]{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;margin:0;padding:0;
  -webkit-appearance:none;appearance:none;
  background:transparent;pointer-events:none;
  height:4px;outline:none;
}
.dual-range input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;pointer-events:all;
  width:19px;height:19px;border-radius:50%;
  border:2.5px solid var(--parch);cursor:grab;
  transition:transform .1s,box-shadow .1s;
}
.dual-range input[type=range]:active::-webkit-slider-thumb{cursor:grabbing;transform:scale(1.15)}
.dual-range input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(0,0,0,.09)}
.dual-range input[type=range]::-moz-range-thumb{
  pointer-events:all;width:16px;height:16px;
  border-radius:50%;border:2px solid var(--parch);cursor:grab;
}
.r-now::-webkit-slider-thumb{background:var(--now) !important}
.r-now::-moz-range-thumb{background:var(--now)}
.r-future::-webkit-slider-thumb{background:var(--future) !important}
.r-future::-moz-range-thumb{background:var(--future)}
.track-bg{
  position:absolute;top:50%;left:0;right:0;height:4px;
  background:var(--track);border-radius:2px;transform:translateY(-50%);
  pointer-events:none;z-index:0
}
.track-fill{
  position:absolute;top:50%;height:4px;
  background:linear-gradient(to right,rgba(193,123,42,.45),rgba(74,106,46,.45));
  border-radius:2px;transform:translateY(-50%);
  pointer-events:none;z-index:1
}
.val-cell{text-align:right;vertical-align:middle !important}
.val-pair{display:flex;justify-content:flex-end;gap:.45rem;align-items:center;white-space:nowrap}
.vnow{font-size:.73rem;font-weight:600;color:var(--now)}
.vfuture{font-size:.73rem;font-weight:600;color:var(--future)}
.val-arrow{font-size:.62rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <h1>What field of learning is most important to you,<br>and how does this change?</h1>
  <p class="sub">Drag the <span style="color:var(--now);font-weight:500">amber</span> dot for relevance today. Drag the <span style="color:var(--future);font-weight:500">green</span> dot for how relevant it will be in five years.</p>

  <div class="spider-wrap">
    <canvas id="spider" width="620" height="600"></canvas>
    <div class="legend">
      <span><span class="ldot" style="background:var(--now)"></span>How relevant is it now?</span>
      <span><span class="ldot" style="background:var(--future)"></span>How relevant will it be in 5 years?</span>
    </div>
  </div>

  <table class="slider-table">
    <thead>
      <tr>
        <th class="col-name">Practice Centre</th>
        <th class="col-slider">Low relevance → High relevance</th>
        <th class="col-vals">Now → 5 yrs</th>
      </tr>
    </thead>
    <tbody id="slider-body"></tbody>
  </table>
</div>

<script>
var CENTRES = [
  {key:'study',        label:'Study',        def:'The ability to think critically, read deeply, and write effectively.'},
  {key:'growth',       label:'Growth',       def:'Build self-awareness, self-belief, and goal-clarity.'},
  {key:'research',     label:'Research',     def:'Source new information, validate knowledge, and stay at the leading edge.'},
  {key:'innovation',   label:'Innovation',   def:'Transform experience into improvement, new solutions, and change.'},
  {key:'leadership',   label:'Leadership',   def:'Build and motivate sustainable, high-performing teams and organisations.'},
  {key:'professional', label:'Professional', def:'Demonstrate personal effectiveness, integrity, and competence across management functions and professional roles.'},
  {key:'digital',      label:'Digital',      def:'Utilise technology seamlessly to maximise personal effectiveness and organisational goals.'}
];
var N = CENTRES.length;
var NOW  = {study:5,growth:5,research:4,innovation:6,leadership:5,professional:5,digital:4};
var FIVE = {study:8,growth:8,research:6,innovation:8,leadership:9,professional:7,digital:7};

var tbody = document.getElementById('slider-body');
CENTRES.forEach(function(c){
  var tr = document.createElement('tr');
  tr.innerHTML =
    '<td>'+
      '<span class="centre-name">'+c.label+'</span>'+
      '<span class="centre-def">'+c.def+'</span>'+
    '</td>'+
    '<td class="slider-td">'+
      '<div class="dual-range" id="dr-'+c.key+'">'+
        '<div class="track-bg"></div>'+
        '<div class="track-fill" id="tf-'+c.key+'"></div>'+
        '<input type="range" class="r-now" id="n-'+c.key+'" min="0" max="10" step="1" value="'+NOW[c.key]+'">'+
        '<input type="range" class="r-future" id="f-'+c.key+'" min="0" max="10" step="1" value="'+FIVE[c.key]+'">'+
      '</div>'+
    '</td>'+
    '<td class="val-cell">'+
      '<div class="val-pair">'+
        '<span class="vnow" id="nv-'+c.key+'">'+NOW[c.key]+'</span>'+
        '<span class="val-arrow">→</span>'+
        '<span class="vfuture" id="fv-'+c.key+'">'+FIVE[c.key]+'</span>'+
      '</div>'+
    '</td>';
  tbody.appendChild(tr);
});

function updateTrack(c){
  var lo=Math.min(NOW[c.key],FIVE[c.key])/10;
  var hi=Math.max(NOW[c.key],FIVE[c.key])/10;
  var tf=document.getElementById('tf-'+c.key);
  tf.style.left=(lo*100)+'%';
  tf.style.width=((hi-lo)*100)+'%';
}
CENTRES.forEach(function(c){
  updateTrack(c);
  var ns=document.getElementById('n-'+c.key);
  var fs=document.getElementById('f-'+c.key);
  ns.addEventListener('input',function(){NOW[c.key]=+ns.value;document.getElementById('nv-'+c.key).textContent=ns.value;updateTrack(c);kick()});
  fs.addEventListener('input',function(){FIVE[c.key]=+fs.value;document.getElementById('fv-'+c.key).textContent=fs.value;updateTrack(c);kick()});
});

/* Spider */
var cvs=document.getElementById('spider');
var ctx=cvs.getContext('2d');
var W=620,H=600,MX=310,MY=305,R=210;
var cNow={},cFive={};
CENTRES.forEach(function(c){cNow[c.key]=NOW[c.key]/10;cFive[c.key]=FIVE[c.key]/10;});

var rafId=null;
function lerp(a,b,t){return a+(b-a)*t}
function kick(){if(!rafId) rafId=requestAnimationFrame(animate)}
function animate(){
  var dirty=false;
  CENTRES.forEach(function(c){
    var tn=NOW[c.key]/10,tf=FIVE[c.key]/10;
    if(Math.abs(cNow[c.key]-tn)>.0008||Math.abs(cFive[c.key]-tf)>.0008) dirty=true;
    cNow[c.key]=lerp(cNow[c.key],tn,.13);
    cFive[c.key]=lerp(cFive[c.key],tf,.13);
  });
  draw();
  rafId=dirty?requestAnimationFrame(animate):null;
}

function angle(i){return -Math.PI/2+i*(2*Math.PI/N)}
function pt(i,val){var a=angle(i);return{x:MX+val*R*Math.cos(a),y:MY+val*R*Math.sin(a)}}

function drawPoly(store,fill,stroke,lw){
  ctx.beginPath();
  CENTRES.forEach(function(c,i){var p=pt(i,store[c.key]);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.closePath();
  ctx.fillStyle=fill;ctx.fill();
  ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  /* rings */
  [.25,.5,.75,1].forEach(function(f){
    ctx.beginPath();
    CENTRES.forEach(function(c,i){var p=pt(i,f);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
    ctx.closePath();
    ctx.strokeStyle=f===1?'rgba(130,100,60,.35)':'rgba(130,100,60,.13)';
    ctx.lineWidth=f===1?1:.5;
    ctx.setLineDash(f<1?[3,4]:[]);ctx.stroke();ctx.setLineDash([]);
  });

  /* spokes */
  CENTRES.forEach(function(c,i){
    var tip=pt(i,1);
    ctx.beginPath();ctx.moveTo(MX,MY);ctx.lineTo(tip.x,tip.y);
    ctx.strokeStyle='rgba(140,105,65,.2)';ctx.lineWidth=.7;ctx.stroke();
  });

  drawPoly(cFive,'rgba(74,106,46,.12)','#4A6A2E',1.8);
  drawPoly(cNow,'rgba(193,123,42,.18)','#C17B2A',2);

  CENTRES.forEach(function(c,i){
    var pf=pt(i,cFive[c.key]);
    ctx.beginPath();ctx.arc(pf.x,pf.y,8,0,Math.PI*2);
    ctx.strokeStyle='rgba(74,106,46,.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(pf.x,pf.y,5.5,0,Math.PI*2);
    ctx.fillStyle='#4A6A2E';ctx.fill();

    var pn=pt(i,cNow[c.key]);
    ctx.beginPath();ctx.arc(pn.x,pn.y,8,0,Math.PI*2);
    ctx.strokeStyle='rgba(193,123,42,.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(pn.x,pn.y,5.5,0,Math.PI*2);
    ctx.fillStyle='#C17B2A';ctx.fill();
  });

  /* labels — use two lines for long names */
  var LR=R+40, THR=18;
  CENTRES.forEach(function(c,i){
    var a=angle(i);
    var lx=MX+LR*Math.cos(a), ly=MY+LR*Math.sin(a);
    ctx.font='500 12.5px \'DM Sans\',system-ui,sans-serif';
    ctx.fillStyle='#3A2410';
    ctx.textAlign=lx<MX-THR?'right':lx>MX+THR?'left':'center';

    /* split long label into two lines */
    var words=c.label.split(' ');
    if(words.length===1){
      ctx.textBaseline=ly<MY-THR?'bottom':ly>MY+THR?'top':'middle';
      ctx.fillText(c.label,lx,ly);
    } else {
      var half=Math.ceil(words.length/2);
      var line1=words.slice(0,half).join(' ');
      var line2=words.slice(half).join(' ');
      ctx.textBaseline='middle';
      ctx.fillText(line1,lx,ly-8);
      ctx.fillText(line2,lx,ly+8);
    }
  });
}

draw();kick();
</script>
</body>
</html>
